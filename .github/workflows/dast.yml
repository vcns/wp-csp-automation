name: DAST

on:
  pull_request:
    branches:
      - development
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-baseline:
    name: ZAP Baseline Against Disposable WordPress
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uwordpress -pwordpress"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Start WordPress
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name wp-csp-app \
            --network host \
            -e WORDPRESS_DB_HOST=127.0.0.1:3306 \
            -e WORDPRESS_DB_USER=wordpress \
            -e WORDPRESS_DB_PASSWORD=wordpress \
            -e WORDPRESS_DB_NAME=wordpress \
            -v "$PWD":/var/www/html/wp-content/plugins/wp-csp-automation \
            wordpress:6.7-php8.1-apache

      - name: Wait for WordPress
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1 >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo 'WordPress did not become ready in time.'
          docker logs wp-csp-app || true
          exit 1

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1'
          allow_issue_writing: false
          fail_action: false

      - name: Show container logs on failure
        if: failure()
        shell: bash
        run: docker logs wp-csp-app || true

      - name: Cleanup
        if: always()
        shell: bash
        run: docker rm -f wp-csp-app || true
