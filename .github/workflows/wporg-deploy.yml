name: Deploy to WordPress.org

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'GitHub environment providing WordPress.org deploy credentials'
        required: true
        default: production
        type: choice
        options:
          - development
          - production

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Plugin to WordPress.org SVN
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'production' }}

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ vars.SVC_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: wp-csp-automation
