name: CI

on:
  push:
    branches:
      - development
      - main
      - 'codex/**'
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read
  security-events: write

jobs:
  php-lint-and-standards:
    name: PHP Lint, PHPCS, and PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP syntax lint
        run: composer run lint:php

      - name: PHPCS
        run: composer run lint:phpcs -- --report=full

      - name: PHPUnit
        run: composer run test:no-coverage

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --results=verified,unknown

  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep scan --config p/php --config p/owasp-top-ten --config p/secrets

  package-audit:
    name: Build Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build distribution zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/wp-csp-automation
          rsync -av ./ dist/wp-csp-automation/ --exclude-from='.distignore'
          cd dist
          zip -r wp-csp-automation.zip wp-csp-automation

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-csp-automation-dist
          path: dist/wp-csp-automation.zip
