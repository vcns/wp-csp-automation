name: Release Package

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.distignore'
      - '.github/workflows/release-package.yml'
      - 'assets/**'
      - 'composer.json'
      - 'composer.lock'
      - 'includes/**'
      - 'LICENSE'
      - 'readme.txt'
      - 'tools/generate-update-manifest.php'
      - 'tools/lint-php.php'
      - 'uninstall.php'
      - 'wp-csp-automation.php'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validate and build release ZIP
    runs-on: ubuntu-latest

    outputs:
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      manifest_filename: ${{ steps.build.outputs.manifest_filename }}
      version: ${{ steps.release_meta.outputs.version }}
      zip_filename: ${{ steps.build.outputs.zip_filename }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y rsync unzip zip

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP syntax lint
        run: composer run lint:php

      - name: PHPCS
        run: composer run lint:phpcs -- --report=full

      - name: PHPUnit
        run: composer run test:no-coverage

      - name: Composer audit
        run: composer audit

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          php <<'PHP' > /tmp/plugin-version.env
          <?php
          $plugin = file_get_contents('wp-csp-automation.php');
          if (false === $plugin) {
              fwrite(STDERR, "Unable to read wp-csp-automation.php\n");
              exit(1);
          }

          preg_match('/^\s*\*\s+Version:\s*([^\r\n]+)/mi', $plugin, $header_matches);
          preg_match("/define\(\s*'WP_CSP_VERSION'\s*,\s*'([^']+)'\s*\)/", $plugin, $constant_matches);

          $header_version = trim($header_matches[1] ?? '');
          $constant_version = trim($constant_matches[1] ?? '');

          if ('' === $header_version || $header_version !== $constant_version) {
              fwrite(STDERR, "Plugin header Version and WP_CSP_VERSION must match.\n");
              fwrite(STDERR, "Header: {$header_version}\n");
              fwrite(STDERR, "Constant: {$constant_version}\n");
              exit(1);
          }

          if (is_readable('readme.txt')) {
              $readme = file_get_contents('readme.txt');
              preg_match('/^Stable tag:\s*([^\r\n]+)/mi', (string) $readme, $stable_matches);
              $stable_tag = trim($stable_matches[1] ?? '');
              if ('' !== $stable_tag && $stable_tag !== $header_version) {
                  fwrite(STDERR, "readme.txt Stable tag must match plugin version {$header_version}.\n");
                  fwrite(STDERR, "Stable tag: {$stable_tag}\n");
                  exit(1);
              }
          }

          echo "PLUGIN_VERSION={$header_version}\n";
          PHP

          # shellcheck disable=SC1091
          source /tmp/plugin-version.env

          REF="${GITHUB_REF:-}"
          TAG="${GITHUB_REF_NAME:-}"
          IS_PRERELEASE=false

          if [[ "${REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${TAG#v}"
            if [[ "${TAG_VERSION}" != "${PLUGIN_VERSION}" ]]; then
              echo "Release tag ${TAG} must match plugin version ${PLUGIN_VERSION}." >&2
              exit 1
            fi
            if [[ "${TAG}" == *"-"* ]]; then
              IS_PRERELEASE=true
            fi
          else
            TAG="dev-${GITHUB_SHA::12}"
          fi

          echo "version=${PLUGIN_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "is_prerelease=${IS_PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Build release ZIP and manifest
        id: build
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.release_meta.outputs.version }}"
          TAG="${{ steps.release_meta.outputs.tag }}"
          ZIP_FILENAME="wp-csp-automation-${TAG}.zip"
          MANIFEST_FILENAME="wp-csp-automation.json"
          DOWNLOAD_URL=""
          RELEASE_URL=""

          rm -rf dist
          mkdir -p dist/wp-csp-automation

          rsync -a --delete --exclude-from='.distignore' ./ dist/wp-csp-automation/

          COMMIT_TIMESTAMP="$(git log -1 --format=%ct)"
          find dist/wp-csp-automation -exec touch -h -d "@${COMMIT_TIMESTAMP}" {} +

          cd dist
          find wp-csp-automation -type f -print | LC_ALL=C sort | zip -q -X "${ZIP_FILENAME}" -@
          cd ..

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"

            if [[ "${TAG}" == *"-"* ]]; then
              DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_FILENAME}"
            else
              DOWNLOAD_URL="https://vcns.github.io/wp-updates/wp-csp-automation/wp-csp-automation-latest.zip"
            fi
          fi

          MANIFEST_ARGS=(
            --version "${VERSION}"
            --output "dist/${MANIFEST_FILENAME}"
          )

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            MANIFEST_ARGS+=(--download-url "${DOWNLOAD_URL}")
            MANIFEST_ARGS+=(--release-url "${RELEASE_URL}")
          else
            MANIFEST_ARGS+=(--allow-empty-urls)
          fi

          php tools/generate-update-manifest.php "${MANIFEST_ARGS[@]}"

          echo "zip_filename=${ZIP_FILENAME}" >> "${GITHUB_OUTPUT}"
          echo "manifest_filename=${MANIFEST_FILENAME}" >> "${GITHUB_OUTPUT}"

      - name: Verify ZIP structure
        shell: bash
        run: |
          set -euo pipefail

          ZIP="dist/${{ steps.build.outputs.zip_filename }}"

          unzip -l "${ZIP}" | grep -q 'wp-csp-automation/wp-csp-automation.php'
          unzip -l "${ZIP}" | grep -q 'wp-csp-automation/uninstall.php'

          if unzip -l "${ZIP}" | grep -E 'wp-csp-automation/(\.git|\.github|\.private_key|\.public_key|cloudflare|docs|node_modules|offline|test|tools|vendor)/'; then
            echo "Release ZIP contains development, private, documentation, or generated-only paths. Check .distignore." >&2
            exit 1
          fi

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-csp-automation-release-zip
          path: |
            dist/${{ steps.build.outputs.zip_filename }}
            dist/${{ steps.build.outputs.manifest_filename }}
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: wp-csp-automation-release-zip
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          ZIP_FILENAME="${{ needs.build.outputs.zip_filename }}"
          MANIFEST_FILENAME="${{ needs.build.outputs.manifest_filename }}"

          PRERELEASE_FLAG=""
          if [[ "${{ needs.build.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "dist/${ZIP_FILENAME}" "dist/${MANIFEST_FILENAME}" --clobber
          else
            gh release create "${TAG}" \
              --title "WP CSP Automation ${TAG}" \
              --generate-notes \
              ${PRERELEASE_FLAG} \
              "dist/${ZIP_FILENAME}" \
              "dist/${MANIFEST_FILENAME}"
          fi

  update-feed:
    name: Publish shared update feed
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: wp-csp-automation-release-zip
          path: dist/

      - name: Generate update feed files
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILENAME="${{ needs.build.outputs.zip_filename }}"
          FEED_DIR="/tmp/pages"

          mkdir -p "${FEED_DIR}"
          cp "dist/${ZIP_FILENAME}" "${FEED_DIR}/wp-csp-automation-latest.zip"

          php tools/generate-update-manifest.php \
            --tag "${GITHUB_REF_NAME}" \
            --download-url "https://vcns.github.io/wp-updates/wp-csp-automation/wp-csp-automation-latest.zip" \
            --release-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --output "${FEED_DIR}/wp-csp-automation.json"

          cat > "${FEED_DIR}/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>WP CSP Automation Updates</title>
          </head>
          <body>
            <h1>WP CSP Automation Updates</h1>
            <ul>
              <li><a href="./wp-csp-automation.json">Latest update manifest</a></li>
              <li><a href="./wp-csp-automation-latest.zip">Latest release ZIP</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Verify update token
        env:
          WP_UPDATES_TOKEN: ${{ secrets.WP_UPDATES_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${WP_UPDATES_TOKEN:-}" ]]; then
            echo "Missing WP_UPDATES_TOKEN secret. Add a token with write access to vcns/wp-updates, then rerun this workflow." >&2
            exit 1
          fi

      - name: Deploy to vcns/wp-updates
        env:
          WP_UPDATES_TOKEN: ${{ secrets.WP_UPDATES_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          UPDATE_REPO="vcns/wp-updates"
          WORKTREE="/tmp/wp-updates"
          REMOTE_URL="https://x-access-token:${WP_UPDATES_TOKEN}@github.com/${UPDATE_REPO}.git"

          if git ls-remote --exit-code --heads "${REMOTE_URL}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${REMOTE_URL}" "${WORKTREE}"
          else
            mkdir -p "${WORKTREE}"
            git -C "${WORKTREE}" init --initial-branch=gh-pages
            git -C "${WORKTREE}" remote add origin "${REMOTE_URL}"
          fi

          mkdir -p "${WORKTREE}/wp-csp-automation"
          cp -R /tmp/pages/. "${WORKTREE}/wp-csp-automation/"

          git -C "${WORKTREE}" config user.name "github-actions[bot]"
          git -C "${WORKTREE}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${WORKTREE}" add wp-csp-automation

          if git -C "${WORKTREE}" diff --cached --quiet; then
            echo "No update feed changes to publish."
            exit 0
          fi

          git -C "${WORKTREE}" commit -m "Publish wp-csp-automation ${GITHUB_REF_NAME}"
          git -C "${WORKTREE}" push origin gh-pages
