name: Release Package

# ── Triggers ──────────────────────────────────────────────────────────────────
# Push a semver tag  (e.g. git tag v0.2.0 && git push origin v0.2.0)
#   → builds ZIP, creates GitHub Release, attaches ZIP, and publishes the latest
#     stable ZIP plus update manifest through GitHub Pages.
#
# Open a PR against development
#   → smoke-check only: builds ZIP and uploads it as a workflow artifact.
#
# Manual dispatch
#   → smoke-check only: useful for verifying packaging on any branch.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'       # pre-releases: v1.0.0-beta.1
  pull_request:
    branches:
      - development
    paths:
      - 'wp-csp-automation.php'
      - 'uninstall.php'
      - 'includes/**'
      - 'assets/**'
      - 'LICENSE'
      - '.distignore'
  workflow_dispatch:

permissions:
  contents: write    # required to create releases and upload release assets
  pages: write
  id-token: write

# ── Job: build ────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build distributable ZIP
    runs-on: ubuntu-latest

    outputs:
      zip_filename: ${{ steps.build.outputs.zip_filename }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ZIP
        id: build
        shell: bash
        run: |
          set -euo pipefail

          # Use the tag name when triggered by a tag push; otherwise "dev".
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="dev"
          fi

          ZIP_FILENAME="wp-csp-automation-${TAG}.zip"

          # Copy only distributable files into a versioned subdirectory so the
          # ZIP extracts to  wp-csp-automation/  (the expected WP plugin folder).
          mkdir -p dist/wp-csp-automation
          rsync -a --exclude-from='.distignore' ./ dist/wp-csp-automation/

          cd dist
          zip -r "${ZIP_FILENAME}" wp-csp-automation/

          echo "zip_filename=${ZIP_FILENAME}" >> "${GITHUB_OUTPUT}"

      - name: Verify plugin header present
        shell: bash
        run: |
          set -euo pipefail
          unzip -l dist/*.zip | grep -q 'wp-csp-automation/wp-csp-automation.php'
          echo "✓ wp-csp-automation.php confirmed in ZIP"

      - name: Verify offline/ directory absent
        shell: bash
        run: |
          set -euo pipefail
          if unzip -l dist/*.zip | grep -q 'wp-csp-automation/offline/'; then
            echo "✗ offline/ directory found in ZIP — check .distignore" >&2
            exit 1
          fi
          echo "✓ offline/ directory absent from ZIP"

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-csp-automation-zip
          path: dist/*.zip
          retention-days: 30

# ── Job: release ──────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: wp-csp-automation-zip
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          ZIP_FILENAME="${{ needs.build.outputs.zip_filename }}"

          # Mark as pre-release when the tag contains a hyphen (e.g. v1.0.0-beta.1).
          PRERELEASE_FLAG=""
          if [[ "${TAG}" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

