name: SAST

on:
  push:
    branches:
      - development
      - main
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep PHP SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config p/php --config p/owasp-top-ten --config p/secrets